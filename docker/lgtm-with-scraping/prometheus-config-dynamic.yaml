# OTLP configuration (from original LGTM)
otlp:
  keep_identifying_resource_attributes: true
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - service.version
    - deployment.environment.name
    - host.name

storage:
  tsdb:
    out_of_order_time_window: 10m

# Traditional Prometheus scraping with file-based service discovery
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'setlistify'
    scrape_interval: 10s
    file_sd_configs:
      - files:
        - '/etc/prometheus/targets/*.json'
        refresh_interval: 10s
    metrics_path: '/metrics'